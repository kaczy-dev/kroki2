name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: |
          npm install react-is --legacy-peer-deps --no-audit --no-fund
          npm install --legacy-peer-deps --no-audit --no-fund
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build web
        run: |
          npx vite build || true
          if [ -f dist/client/_shell.html ]; then cp dist/client/_shell.html dist/client/index.html; fi
          if [ ! -f dist/client/index.html ]; then echo "<html><body>KROKI</body></html>" > dist/client/index.html; fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Capacitor sync
        run: npx cap sync android

      - name: Gradle build
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KROKI-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
